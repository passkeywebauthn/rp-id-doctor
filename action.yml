name: "rp-id-doctor"
description: "Validate a WebAuthn Relying Party's rpId / origin / related-origin configuration in CI."
branding:
  icon: "shield"
  color: "green"
inputs:
  rp-id:
    description: "The Relying Party ID, e.g. example.com"
    required: true
  origins:
    description: "Whitespace- or newline-separated list of expected origins, e.g. https://login.example.com"
    required: true
  strict:
    description: "Treat warnings as failures"
    required: false
    default: "false"
  network:
    description: "Perform network probes (.well-known fetch, TLS reachability)"
    required: false
    default: "true"
runs:
  using: "composite"
  steps:
    - name: Run rp-id-doctor
      shell: bash
      # Inputs are passed through the environment (never interpolated into the
      # script body) so a multiline origins list word-splits correctly and
      # nothing can be injected into the shell.
      env:
        RP_ID: ${{ inputs.rp-id }}
        ORIGINS: ${{ inputs.origins }}
        STRICT: ${{ inputs.strict }}
        NETWORK: ${{ inputs.network }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        args=(--rp-id "$RP_ID")
        for origin in $ORIGINS; do
          args+=(--origin "$origin")
        done
        if [ "$STRICT" = "true" ]; then args+=(--strict); fi
        if [ "$NETWORK" != "true" ]; then args+=(--no-network); fi
        node "$ACTION_PATH/bin/rp-id-doctor.js" "${args[@]}"
