name: test
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # `node --test` (no glob) auto-discovers test/*.test.js and works on
      # Node 18+ — a quoted "test/*.test.js" glob only expands on Node >= 21.
      - run: node --test
